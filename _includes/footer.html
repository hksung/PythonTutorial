<footer class="site-footer">
  <div class="wrapper">
    <p class="footer-heading">{{ site.title | escape }}</p>
    <p class="footer-note">Hakyung Sung (@ UH)</p>
  </div>
</footer>

<div class="helper-chatbot" data-helper-chatbot>
  <button class="helper-chatbot__launcher" type="button" aria-label="Open tutorial helper" aria-expanded="false">
    Ask Helper
  </button>

  <section class="helper-chatbot__panel" aria-label="Tutorial helper chat" hidden>
    <header class="helper-chatbot__header">
      <div>
        <p class="helper-chatbot__eyebrow">Free local helper</p>
        <h2 class="helper-chatbot__title">Tutorial Assistant</h2>
      </div>
      <button class="helper-chatbot__close" type="button" aria-label="Close helper">Close</button>
    </header>

    <div class="helper-chatbot__body">
      <div class="helper-chatbot__terms-wrap">
        <p class="helper-chatbot__label">Supported terms</p>
        <div class="helper-chatbot__terms" data-supported-terms>
          <button type="button" class="helper-chatbot__term" data-term="python">python</button>
          <button type="button" class="helper-chatbot__term" data-term="interpreter">interpreter</button>
          <button type="button" class="helper-chatbot__term" data-term="script">script</button>
          <button type="button" class="helper-chatbot__term" data-term="ide">ide</button>
          <button type="button" class="helper-chatbot__term" data-term="notebook">notebook</button>
          <button type="button" class="helper-chatbot__term" data-term="environment">environment</button>
          <button type="button" class="helper-chatbot__term" data-term="venv">venv</button>
          <button type="button" class="helper-chatbot__term" data-term="conda">conda</button>
          <button type="button" class="helper-chatbot__term" data-term="package">package</button>
          <button type="button" class="helper-chatbot__term" data-term="string">string</button>
          <button type="button" class="helper-chatbot__term" data-term="integer">integer</button>
          <button type="button" class="helper-chatbot__term" data-term="float">float</button>
          <button type="button" class="helper-chatbot__term" data-term="boolean">boolean</button>
          <button type="button" class="helper-chatbot__term" data-term="none">none</button>
          <button type="button" class="helper-chatbot__term" data-term="assignment">assignment</button>
          <button type="button" class="helper-chatbot__term" data-term="indexing">indexing</button>
          <button type="button" class="helper-chatbot__term" data-term="slicing">slicing</button>
          <button type="button" class="helper-chatbot__term" data-term="concatenation">concatenation</button>
          <button type="button" class="helper-chatbot__term" data-term="membership">membership</button>
          <button type="button" class="helper-chatbot__term" data-term="mutability">mutability</button>
          <button type="button" class="helper-chatbot__term" data-term="variable">variable</button>
          <button type="button" class="helper-chatbot__term" data-term="function">function</button>
          <button type="button" class="helper-chatbot__term" data-term="method">method</button>
          <button type="button" class="helper-chatbot__term" data-term="list">list</button>
          <button type="button" class="helper-chatbot__term" data-term="tuple">tuple</button>
          <button type="button" class="helper-chatbot__term" data-term="dictionary">dictionary</button>
          <button type="button" class="helper-chatbot__term" data-term="key">key</button>
          <button type="button" class="helper-chatbot__term" data-term="value">value</button>
          <button type="button" class="helper-chatbot__term" data-term="tokenization">tokenization</button>
          <button type="button" class="helper-chatbot__term" data-term="lemmatization">lemmatization</button>
          <button type="button" class="helper-chatbot__term" data-term="concordance">concordance</button>
          <button type="button" class="helper-chatbot__term" data-term="corpus">corpus</button>
          <button type="button" class="helper-chatbot__term" data-term="collocation">collocation</button>
          <button type="button" class="helper-chatbot__term" data-term="frequency">frequency</button>
          <button type="button" class="helper-chatbot__term" data-term="regex">regex</button>

          <button type="button" class="helper-chatbot__term" data-term="ndarray">ndarray</button>
          <button type="button" class="helper-chatbot__term" data-term="pytorch">pytorch</button>
          <button type="button" class="helper-chatbot__term" data-term="tensor">tensor</button>
          <button type="button" class="helper-chatbot__term" data-term="embedding">embedding</button>
          <button type="button" class="helper-chatbot__term" data-term="batch">batch</button>
          <button type="button" class="helper-chatbot__term" data-term="sequence">sequence</button>
          <button type="button" class="helper-chatbot__term" data-term="gpu">gpu</button>

    </div>
  </section>
</div>
