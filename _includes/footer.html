<footer class="site-footer">
  <div class="wrapper">
    <p class="footer-heading">{{ site.title | escape }}</p>
    <p class="footer-note">Static tutorial site with a free, local helper chatbot.</p>
  </div>
</footer>

<div class="helper-chatbot" data-helper-chatbot>
  <button class="helper-chatbot__launcher" type="button" aria-label="Open tutorial helper" aria-expanded="false">
    Ask Helper
  </button>

  <section class="helper-chatbot__panel" aria-label="Tutorial helper chat" hidden>
    <header class="helper-chatbot__header">
      <div>
        <p class="helper-chatbot__eyebrow">Free local helper</p>
        <h2 class="helper-chatbot__title">Tutorial Assistant</h2>
      </div>
      <button class="helper-chatbot__close" type="button" aria-label="Close helper">Close</button>
    </header>

    <div class="helper-chatbot__body">
      <div class="helper-chatbot__terms-wrap">
        <p class="helper-chatbot__label">Supported terms</p>
        <pre class="helper-chatbot__terms" data-supported-terms></pre>
      </div>

      <div class="helper-chatbot__messages" role="log" aria-live="polite" aria-relevant="additions"></div>
    </div>

    <form class="helper-chatbot__form" autocomplete="off">
      <textarea class="helper-chatbot__input" rows="2" placeholder="Type one supported word exactly..." aria-label="Ask a question"></textarea>
      <div class="helper-chatbot__actions">
        <button class="helper-chatbot__secondary" type="button" data-action="selection">Explain selection</button>
        <button class="helper-chatbot__primary" type="submit">Send</button>
      </div>
    </form>
  </section>
</div>

<link rel="stylesheet" href="{{ 'assets/css/helper-chatbot.css' | relative_url }}">
<script defer src="{{ 'assets/js/helper-chatbot.js' | relative_url }}"></script>
